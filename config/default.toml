[redis]
addr = "localhost:6379"
password = "$MNEMOIR_REDIS_PASSWORD" # set env var before starting
db = 0

[compressor]
provider = "local" # "claude" | "ollama" | "local"

[compressor.claude]
model = "claude-haiku-4-5-20251001"
# API key from ANTHROPIC_API_KEY env var

[compressor.ollama]
url = "http://localhost:11434"
model = "llama3.2"

# Local compressor uses rule-based text analysis (no API keys needed)

[embedding]
provider = "local" # "openai" | "ollama" | "local"
dimension = 384 # 1536 for openai, 768 for ollama, 384 for local

[embedding.openai]
model = "text-embedding-3-small"
# API key from OPENAI_API_KEY env var

[embedding.ollama]
url = "http://localhost:11434"
model = "nomic-embed-text"

[embedding.local]
model = "sentence-transformers/all-MiniLM-L6-v2"
model_dir = "~/.mnemoir/models"
# dimension auto-set to 384 when provider = "local"

[memory]
default_importance = 5
auto_decay = true
decay_interval = "168h"
decay_factor = 0.9
vector_weight = 0.60       # semantic search weight in hybrid scoring
fts_weight = 0.25          # keyword search weight in hybrid scoring
importance_weight = 0.15   # memory importance weight in hybrid scoring
access_boost_factor = 0.3  # points gained per recall
access_boost_cap = 2.0     # max boost from recalls

[session]
auto_summarize = true
max_recall_items = 20

[server]
health_addr = "" # e.g. ":9090" to enable /healthz endpoint, empty to disable

[maintenance]
enabled = true
forget_threshold = 2.0         # delete memories with effective importance <= this
forget_inactive_days = 90      # only if not accessed in this many days
max_sessions_per_project = 50  # keep N most recent sessions, prune older ones
min_run_interval = "1h"        # skip if maintenance ran less than this ago
