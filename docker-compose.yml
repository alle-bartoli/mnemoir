services:
  redis:
    image: redis/redis-stack:latest
    restart: unless-stopped
    # Security: bind to localhost only, prevent external access
    ports:
      - "127.0.0.1:6379:6379"
      - "127.0.0.1:8001:8001"
    volumes:
      - agentmem-data:/data
    environment:
      # Security: require authentication via env var
      - REDIS_ARGS=--save 60 1 --appendonly yes --maxmemory 512mb --maxmemory-policy allkeys-lru --requirepass ${AGENTMEM_REDIS_PASSWORD:?Set AGENTMEM_REDIS_PASSWORD env var}
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${AGENTMEM_REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 5s
    deploy:
      resources:
        limits:
          memory: 512M

volumes:
  agentmem-data:
