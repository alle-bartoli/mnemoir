services:
  redis:
    image: redis/redis-stack:latest
    # Security: bind to localhost only, prevent external access
    ports:
      - "127.0.0.1:6379:6379"
      - "127.0.0.1:8001:8001"
    volumes:
      - agentmem-data:/data
    environment:
      # Security: require authentication via env var
      - REDIS_ARGS=--save 60 1 --appendonly yes --requirepass ${AGENTMEM_REDIS_PASSWORD:-changeme}

volumes:
  agentmem-data:
